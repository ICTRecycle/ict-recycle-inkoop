<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ICT-Recycle BV — Inkoopbeheer</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ICT Inkoop">
<meta name="theme-color" content="#185FA5">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0eb;min-height:100vh;font-size:15px;color:#111}
input,select,textarea{font-family:inherit;font-size:15px;padding:10px 12px;border:1px solid #ccc;border-radius:10px;width:100%;background:#fff;color:#111;outline:none;-webkit-appearance:none;appearance:none}
input:focus,select:focus,textarea:focus{border-color:#185FA5;box-shadow:0 0 0 3px rgba(24,95,165,0.12)}
button{font-family:inherit;cursor:pointer;border:1px solid #ccc;border-radius:10px;padding:10px 18px;background:#fff;color:#111;font-size:14px;transition:opacity 0.15s;-webkit-appearance:none}
button:active{opacity:0.7}
button.btn-primary{background:#185FA5;color:#fff;border-color:#185FA5}
button.btn-success{background:#3B6D11;color:#fff;border-color:#3B6D11}
button.btn-amber{background:#854F0B;color:#fff;border-color:#854F0B}
button.btn-danger{background:#A32D2D;color:#fff;border-color:#A32D2D}
button.btn-small{padding:6px 12px;font-size:13px}
label{font-size:13px;color:#555;display:block;margin-bottom:5px;font-weight:500}
.card{background:#fff;border:1px solid #e0e0d8;border-radius:14px;padding:1.2rem;margin-bottom:12px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{margin-bottom:14px}
.section-label{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;margin-top:6px}
.list-item{padding:12px 14px;border:1px solid #e0e0d8;border-radius:10px;margin-bottom:8px;background:#fff;display:flex;justify-content:space-between;align-items:center}
.badge{display:inline-block;font-size:12px;padding:3px 10px;border-radius:20px;font-weight:500}
.badge-open{background:#FAEEDA;color:#854F0B}
.badge-closed{background:#EAF3DE;color:#3B6D11}
.stat-box{background:#fff;border:1px solid #e0e0d8;border-radius:12px;padding:1rem;text-align:center;flex:1}
.stat-val{font-size:20px;font-weight:600;color:#111}
.stat-lbl{font-size:12px;color:#888;margin-top:3px}
.empty{text-align:center;padding:2.5rem 1rem;color:#999}
.empty i{font-size:2rem;display:block;margin-bottom:.5rem}

/* NAV */
header{background:#185FA5;position:sticky;top:0;z-index:50}
.header-top{display:flex;align-items:center;padding:0 16px;gap:10px}
.logo{color:#fff;font-weight:600;font-size:16px;padding:14px 0;display:flex;align-items:center;gap:8px}
nav{display:flex;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
nav::-webkit-scrollbar{display:none}
nav button{background:none;border:none;border-radius:0;color:rgba(255,255,255,.65);padding:12px 14px;font-size:13px;font-weight:400;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0}
nav button.active{color:#fff;border-bottom-color:#fff;font-weight:500}

/* MODAL */
.overlay{visibility:hidden;pointer-events:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0}
.overlay.open{visibility:visible;pointer-events:auto;opacity:1}
@media(min-width:600px){.overlay{align-items:center}}
.sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:20px 16px 32px}
@media(min-width:600px){.sheet{border-radius:16px;max-width:560px;max-height:88vh}}
.sheet-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 16px}
.sheet-title{font-size:18px;font-weight:600;margin-bottom:16px}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:16px;flex-wrap:wrap}

/* ORDER LINES */
.line-row{display:grid;grid-template-columns:1fr 64px 90px 36px;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0eb}
.line-row select,.line-row input{font-size:13px;padding:7px 8px}

/* TABS */
.tab-content{display:none;padding:14px 14px 80px}
.tab-content.active{display:block}

/* FAB */
.fab{position:fixed;bottom:24px;right:20px;z-index:100;width:56px;height:56px;border-radius:28px;background:#185FA5;color:#fff;border:none;font-size:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(24,95,165,.4)}

.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.avatar{width:40px;height:40px;border-radius:50%;background:#E6F1FB;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;color:#0C447C;flex-shrink:0}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">♻️ ICT-Recycle BV</div>
  </div>
  <nav id="main-nav">
    <button class="active" onclick="showTab('dashboard',this)">Dashboard</button>
    <button onclick="showTab('orders',this)">Orders</button>
    <button onclick="showTab('customers',this)">Klanten</button>
    <button onclick="showTab('products',this)">Producten</button>
  </nav>
</header>

<!-- DASHBOARD -->
<div id="tab-dashboard" class="tab-content active">
  <div style="display:flex;gap:10px;margin-bottom:14px" id="stats-row"></div>
  <div class="card">
    <div class="section-label">Snel toevoegen</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <button class="btn-primary" onclick="openModal('product',null)" style="text-align:left">＋ Nieuw product + dagprijs</button>
      <button onclick="openModal('customer',null)" style="text-align:left">＋ Nieuwe klant</button>
      <button class="btn-success" onclick="openModal('order',null)" style="text-align:left">＋ Nieuwe inkoop-order</button>
      <button class="btn-amber" onclick="exportXLS()" style="text-align:left">↓ Exporteer naar Excel (.xlsx)</button>
    </div>
  </div>
  <div class="card">
    <div class="section-label">Recente orders</div>
    <div id="recent-orders"></div>
  </div>
</div>

<!-- ORDERS -->
<div id="tab-orders" class="tab-content">
  <div class="btn-row" style="margin-bottom:14px">
    <button id="filter-alle" class="btn-primary btn-small" onclick="setFilter('alle')">Alle</button>
    <button id="filter-open" class="btn-small" onclick="setFilter('open')">Open</button>
    <button id="filter-afgerond" class="btn-small" onclick="setFilter('afgerond')">Afgerond</button>
  </div>
  <div id="orders-list"></div>
</div>

<!-- CUSTOMERS -->
<div id="tab-customers" class="tab-content">
  <div style="display:flex;gap:10px;margin-bottom:14px">
    <input id="customer-search" placeholder="Zoek klant…" oninput="renderCustomers()" style="flex:1">
    <button class="btn-primary" onclick="openModal('customer',null)">＋ Nieuw</button>
  </div>
  <div id="customers-list"></div>
</div>

<!-- PRODUCTS -->
<div id="tab-products" class="tab-content">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div class="section-label" style="margin:0">Producten & dagprijzen</div>
    <button class="btn-primary btn-small" onclick="openModal('product',null)">＋ Nieuw</button>
  </div>
  <div id="products-list"></div>
</div>

<!-- MODAL: PRODUCT -->
<div class="overlay" id="modal-product">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="product-title">Nieuw product</div>
    <input type="hidden" id="product-id">
    <div class="form-group"><label>Productnaam</label><input id="product-name" placeholder="bijv. Lenovo ThinkPad X1 Carbon"></div>
    <div class="form-group"><label>Dagprijs (€)</label><input id="product-price" type="number" step="0.01" min="0" placeholder="0.00"></div>
    <div class="modal-footer">
      <button onclick="closeModal('product')">Annuleren</button>
      <button class="btn-primary" onclick="saveProduct()">✓ Opslaan</button>
    </div>
  </div>
</div>

<!-- MODAL: CUSTOMER -->
<div class="overlay" id="modal-customer">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="customer-title">Nieuwe klant</div>
    <input type="hidden" id="c-id">
    <div class="section-label">Persoonsgegevens</div>
    <div class="form-row">
      <div class="form-group"><label>Voornaam *</label><input id="c-first" placeholder="Jan"></div>
      <div class="form-group"><label>Achternaam *</label><input id="c-last" placeholder="Jansen"></div>
    </div>
    <div class="section-label">Adres</div>
    <div class="form-row">
      <div class="form-group"><label>Straat</label><input id="c-street" placeholder="Hoofdstraat"></div>
      <div class="form-group"><label>Huisnummer</label><input id="c-house" placeholder="12"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Postcode</label><input id="c-zip" placeholder="1234 AB"></div>
      <div class="form-group"><label>Plaats</label><input id="c-city" placeholder="Amsterdam"></div>
    </div>
    <div class="section-label">Contactgegevens</div>
    <div class="form-row">
      <div class="form-group"><label>Mobiel (06)</label><input id="c-phone" placeholder="06-12345678" type="tel"></div>
      <div class="form-group"><label>E-mailadres</label><input id="c-email" type="email" placeholder="jan@email.nl"></div>
    </div>
    <div class="section-label">Bankgegevens</div>
    <div class="form-group"><label>IBAN</label><input id="c-iban" placeholder="NL00 BANK 0000 0000 00"></div>
    <div class="form-group"><label>Tenaamstelling</label><input id="c-ibanname" placeholder="Jan Jansen"></div>
    <div class="modal-footer">
      <button onclick="closeModal('customer')">Annuleren</button>
      <button class="btn-primary" onclick="saveCustomer()">✓ Opslaan</button>
    </div>
  </div>
</div>

<!-- MODAL: ORDER -->
<div class="overlay" id="modal-order">
  <div class="sheet" style="max-width:620px">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="order-title">Nieuwe inkoop-order</div>
    <input type="hidden" id="o-id">
    <div class="form-row">
      <div class="form-group"><label>Klant *</label><select id="o-customer"></select></div>
      <div class="form-group"><label>Datum</label><input id="o-date" type="date"></div>
    </div>
    <div class="form-group" style="max-width:200px"><label>Status</label>
      <select id="o-status"><option value="open">Open</option><option value="afgerond">Afgerond</option></select>
    </div>
    <div class="section-label">Orderregels</div>
    <div style="display:grid;grid-template-columns:1fr 64px 90px 36px;gap:8px;padding:4px 0 6px;font-size:12px;color:#888;font-weight:600">
      <span>Product</span><span style="text-align:center">Aantal</span><span style="text-align:right">Prijs €</span><span></span>
    </div>
    <div id="order-lines"></div>
    <button onclick="addOrderLine()" style="margin-top:10px;font-size:13px">＋ Regel toevoegen</button>
    <div style="text-align:right;margin:12px 0;font-size:16px;font-weight:600">Totaal: <span id="order-total" style="color:#185FA5">€0,00</span></div>
    <div class="form-group"><label>Notitie</label><textarea id="o-note" rows="2" style="resize:vertical"></textarea></div>
    <div class="modal-footer">
      <button class="btn-amber" id="btn-pdf" onclick="pdfCurrentOrder()" style="display:none">↓ PDF bon</button>
      <button onclick="closeModal('order')">Annuleren</button>
      <button class="btn-primary" onclick="saveOrder()">✓ Opslaan</button>
    </div>
  </div>
</div>

<script>
const BEDRIJF = {naam:'ICT-Recycle BV',adres:'Kruchterstraat 56',postcode:'6051 CD',stad:'Maasbracht',email:'support@ict-recycle.nl'};
const KEY = 'ict_recycle_v3';

let db = {customers:[], products:[], orders:[]};
try { const r=localStorage.getItem(KEY); if(r) db=JSON.parse(r); } catch(e){}

function persist(){ try{localStorage.setItem(KEY,JSON.stringify(db));}catch(e){} }
function genId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function eur(n){ return '€'+Number(n||0).toLocaleString('nl-NL',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(d){ if(!d) return '-'; try{ return new Date(d).toLocaleDateString('nl-NL'); } catch(e){ return '-'; } }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── TABS ──────────────────────────────────────────────────────────────────────
let currentTab = 'dashboard';
function showTab(id, btn){
  currentTab = id;
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  if(btn) btn.classList.add('active');
  renderAll();
}

// ── FILTER ────────────────────────────────────────────────────────────────────
let orderFilter = 'alle';
function setFilter(f){
  orderFilter=f;
  ['alle','open','afgerond'].forEach(x=>{
    const b=document.getElementById('filter-'+x);
    b.className='btn-small'+(x===f?' btn-primary':'');
  });
  renderOrders();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderAll(){ renderDashboard(); renderOrders(); renderCustomers(); renderProducts(); }

function renderDashboard(){
  const total = db.orders.reduce((s,o)=>s+(o.total||0),0);
  const open = db.orders.filter(o=>o.status==='open').length;
  document.getElementById('stats-row').innerHTML=`
    <div class="stat-box"><div class="stat-val">${db.orders.length}</div><div class="stat-lbl">Orders</div></div>
    <div class="stat-box"><div class="stat-val">${eur(total)}</div><div class="stat-lbl">Inkoopwaarde</div></div>
    <div class="stat-box"><div class="stat-val">${open}</div><div class="stat-lbl">Open</div></div>`;
  const recent = [...db.orders].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,5);
  const ro = document.getElementById('recent-orders');
  if(!recent.length){ ro.innerHTML='<div class="empty">Nog geen orders</div>'; return; }
  ro.innerHTML = recent.map(o=>{
    const c=db.customers.find(x=>x.id===o.customerId);
    const nm=c?`${esc(c.firstName)} ${esc(c.lastName)}`:'—';
    return `<div class="list-item" onclick="editOrder('${o.id}')">
      <div><div style="font-weight:500">${nm}</div><div style="font-size:12px;color:#888">${fmtDate(o.date)} · ${o.lines.length} regel${o.lines.length!==1?'s':''}</div></div>
      <div style="text-align:right"><div style="font-weight:500;color:#185FA5">${eur(o.total)}</div><span class="badge badge-${o.status}">${esc(o.status)}</span></div>
    </div>`;
  }).join('');
}

function renderOrders(){
  const list = db.orders.filter(o=>orderFilter==='alle'||o.status===orderFilter)
    .sort((a,b)=>new Date(b.date)-new Date(a.date));
  const el=document.getElementById('orders-list');
  if(!list.length){el.innerHTML='<div class="empty">Geen orders</div>';return;}
  el.innerHTML=list.map(o=>{
    const c=db.customers.find(x=>x.id===o.customerId);
    const nm=c?`${esc(c.firstName)} ${esc(c.lastName)}`:'Onbekende klant';
    const preview=o.lines.slice(0,3).map(l=>`${l.qty}× ${esc(l.productName)}`).join(' · ')+(o.lines.length>3?` +${o.lines.length-3} meer`:'');
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><div style="font-weight:500;font-size:15px">${nm}</div><div style="font-size:13px;color:#888;margin-top:2px">${fmtDate(o.date)}</div></div>
        <div style="text-align:right"><div style="font-weight:600;font-size:15px;color:#185FA5">${eur(o.total)}</div><span class="badge badge-${o.status}">${esc(o.status)}</span></div>
      </div>
      ${preview?`<div style="font-size:13px;color:#888;margin-top:8px">${preview}</div>`:''}
      <div class="btn-row" style="margin-top:12px">
        <button class="btn-amber btn-small" onclick="exportPDF('${o.id}')">↓ PDF bon</button>
        <button class="btn-small" onclick="editOrder('${o.id}')">✎ Bewerken</button>
        <button class="btn-small" style="color:#A32D2D" onclick="deleteItem('orders','${o.id}')">✕ Verwijderen</button>
      </div>
    </div>`;
  }).join('');
}

function renderCustomers(){
  const q=(document.getElementById('customer-search')?.value||'').toLowerCase();
  const list=db.customers.filter(c=>`${c.firstName} ${c.lastName} ${c.city} ${c.email}`.toLowerCase().includes(q));
  const el=document.getElementById('customers-list');
  if(!list.length){el.innerHTML=`<div class="empty">${q?'Geen resultaten':'Nog geen klanten'}</div>`;return;}
  el.innerHTML=list.map(c=>`<div class="list-item">
    <div style="display:flex;align-items:center;gap:12px">
      <div class="avatar">${esc(c.firstName[0])}${esc(c.lastName[0])}</div>
      <div>
        <div style="font-weight:500">${esc(c.firstName)} ${esc(c.lastName)}</div>
        <div style="font-size:12px;color:#888">${esc(c.city||'—')} · ${esc(c.phone||c.email||'—')}</div>
        ${c.iban?`<div style="font-size:11px;color:#aaa">${esc(c.iban)}</div>`:''}
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-small" onclick="editCustomer('${c.id}')">✎</button>
      <button class="btn-small" style="color:#A32D2D" onclick="deleteItem('customers','${c.id}')">✕</button>
    </div>
  </div>`).join('');
}

function renderProducts(){
  const el=document.getElementById('products-list');
  if(!db.products.length){el.innerHTML='<div class="empty">Nog geen producten</div>';return;}
  el.innerHTML=[...db.products].sort((a,b)=>a.name.localeCompare(b.name)).map(p=>`<div class="list-item">
    <div>
      <div style="font-weight:500">${esc(p.name)}</div>
      <div style="font-size:12px;color:#888">bijgewerkt ${fmtDate(p.updatedAt)}</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-weight:600;color:#185FA5">${eur(p.price)}</span>
      <button class="btn-small" onclick="editProduct('${p.id}')">✎</button>
      <button class="btn-small" style="color:#A32D2D" onclick="deleteItem('products','${p.id}')">✕</button>
    </div>
  </div>`).join('');
}

// ── MODAL HELPERS ─────────────────────────────────────────────────────────────
function openModal(type, data){ document.getElementById('modal-'+type).classList.add('open'); }
function closeModal(type){ document.getElementById('modal-'+type).classList.remove('open'); }

// Close on backdrop click
document.querySelectorAll('.overlay').forEach(el=>{
  el.addEventListener('click',e=>{ if(e.target===el) el.classList.remove('open'); });
});

// ── PRODUCT MODAL ─────────────────────────────────────────────────────────────
function openModal(type, data){
  if(type==='product'){
    document.getElementById('product-title').textContent = data?'Product bewerken':'Nieuw product';
    document.getElementById('product-id').value = data?.id||'';
    document.getElementById('product-name').value = data?.name||'';
    document.getElementById('product-price').value = data?.price||'';
  }
  if(type==='customer'){
    document.getElementById('customer-title').textContent = data?'Klant bewerken':'Nieuwe klant';
    const f=['id','first','last','street','house','zip','city','phone','email','iban','ibanname'];
    const map={id:'id',first:'firstName',last:'lastName',street:'street',house:'houseNumber',zip:'zip',city:'city',phone:'phone',email:'email',iban:'iban',ibanname:'ibanName'};
    f.forEach(k=>{ document.getElementById('c-'+k).value = data?.[map[k]]||''; });
  }
  if(type==='order'){
    const isNew=!data;
    document.getElementById('order-title').textContent = isNew?'Nieuwe inkoop-order':'Order bewerken';
    document.getElementById('o-id').value = data?.id||'';
    document.getElementById('o-date').value = data?.date||new Date().toISOString().slice(0,10);
    document.getElementById('o-note').value = data?.note||'';
    document.getElementById('o-status').value = data?.status||'open';
    document.getElementById('btn-pdf').style.display = isNew?'none':'';
    // Fill customer select
    const sel=document.getElementById('o-customer');
    sel.innerHTML='<option value="">— kies klant —</option>'+db.customers.map(c=>`<option value="${c.id}"${data?.customerId===c.id?' selected':''}>${esc(c.firstName)} ${esc(c.lastName)}</option>`).join('');
    // Fill lines
    currentLines = data?.lines ? JSON.parse(JSON.stringify(data.lines)) : [];
    renderOrderLines();
  }
  document.getElementById('modal-'+type).classList.add('open');
}

function saveProduct(){
  const id=document.getElementById('product-id').value;
  const name=document.getElementById('product-name').value.trim();
  const price=parseFloat(document.getElementById('product-price').value);
  if(!name||isNaN(price)){ alert('Vul naam en prijs in.'); return; }
  if(id){ const i=db.products.findIndex(x=>x.id===id); db.products[i]={...db.products[i],name,price,updatedAt:new Date().toISOString()}; }
  else { db.products.push({id:genId(),name,price,updatedAt:new Date().toISOString()}); }
  persist(); closeModal('product'); renderAll();
}

function editProduct(id){ openModal('product', db.products.find(x=>x.id===id)); }

function saveCustomer(){
  const id=document.getElementById('c-id').value;
  const map={firstName:'c-first',lastName:'c-last',street:'c-street',houseNumber:'c-house',zip:'c-zip',city:'c-city',phone:'c-phone',email:'c-email',iban:'c-iban',ibanName:'c-ibanname'};
  const obj={};
  for(const [k,eid] of Object.entries(map)) obj[k]=document.getElementById(eid).value.trim();
  if(!obj.firstName||!obj.lastName){ alert('Vul voornaam en achternaam in.'); return; }
  if(id){ const i=db.customers.findIndex(x=>x.id===id); db.customers[i]={...db.customers[i],...obj}; }
  else { db.customers.push({id:genId(),...obj,createdAt:new Date().toISOString()}); }
  persist(); closeModal('customer'); renderAll();
}

function editCustomer(id){ openModal('customer', db.customers.find(x=>x.id===id)); }

// ── ORDER LINES ───────────────────────────────────────────────────────────────
let currentLines = [];

function renderOrderLines(){
  const el=document.getElementById('order-lines');
  if(!currentLines.length){ el.innerHTML=''; updateOrderTotal(); return; }
  el.innerHTML=currentLines.map((ln,i)=>`
    <div class="line-row">
      <select onchange="lineProductChange(${i},this.value)">
        ${db.products.map(p=>`<option value="${p.id}"${p.id===ln.productId?' selected':''}>${esc(p.name)}</option>`).join('')}
        ${!db.products.find(p=>p.id===ln.productId)?`<option value="${ln.productId}" selected>${esc(ln.productName)}</option>`:''}
      </select>
      <input type="number" min="1" value="${ln.qty}" onchange="lineQtyChange(${i},this.value)" style="text-align:center">
      <input type="number" step="0.01" value="${ln.unitPrice}" onchange="linePriceChange(${i},this.value)" style="text-align:right">
      <button onclick="removeLine(${i})" style="color:#A32D2D;border:none;padding:6px 4px">✕</button>
    </div>`).join('');
  updateOrderTotal();
}

function lineProductChange(i,pid){
  const p=db.products.find(x=>x.id===pid);
  if(p){ currentLines[i].productId=p.id; currentLines[i].productName=p.name; currentLines[i].unitPrice=p.price; }
  renderOrderLines();
}
function lineQtyChange(i,v){ currentLines[i].qty=parseFloat(v)||1; updateOrderTotal(); }
function linePriceChange(i,v){ currentLines[i].unitPrice=parseFloat(v)||0; updateOrderTotal(); }
function removeLine(i){ currentLines.splice(i,1); renderOrderLines(); }
function addOrderLine(){
  if(!db.products.length){ alert('Voeg eerst producten toe.'); return; }
  const p=db.products[0];
  currentLines.push({id:genId(),productId:p.id,productName:p.name,unitPrice:p.price,qty:1});
  renderOrderLines();
}
function updateOrderTotal(){
  const t=currentLines.reduce((s,l)=>s+(l.qty*l.unitPrice),0);
  document.getElementById('order-total').textContent=eur(t);
}

function saveOrder(){
  const cid=document.getElementById('o-customer').value;
  if(!cid){ alert('Selecteer een klant.'); return; }
  const id=document.getElementById('o-id').value;
  const total=currentLines.reduce((s,l)=>s+(l.qty*l.unitPrice),0);
  const obj={customerId:cid,date:document.getElementById('o-date').value,lines:JSON.parse(JSON.stringify(currentLines)),note:document.getElementById('o-note').value,status:document.getElementById('o-status').value,total};
  if(id){ const i=db.orders.findIndex(x=>x.id===id); db.orders[i]={...db.orders[i],...obj}; }
  else { db.orders.push({id:genId(),...obj,createdAt:new Date().toISOString()}); }
  persist(); closeModal('order'); renderAll();
}

function editOrder(id){
  const o=db.orders.find(x=>x.id===id);
  openModal('order',o);
  showTab('orders', document.querySelector('nav button:nth-child(2)'));
}

function deleteItem(type,id){
  if(!confirm('Weet je zeker dat je dit wilt verwijderen?')) return;
  db[type]=db[type].filter(x=>x.id!==id);
  persist(); renderAll();
}

// ── PDF BON ───────────────────────────────────────────────────────────────────
function pdfCurrentOrder(){
  const id=document.getElementById('o-id').value;
  if(id) exportPDF(id);
}

function exportPDF(orderId){
  const o=db.orders.find(x=>x.id===orderId);
  if(!o){ alert('Order niet gevonden.'); return; }
  const { jsPDF }=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const c=db.customers.find(x=>x.id===o.customerId);
  const klant=c?`${c.firstName} ${c.lastName}`:'Onbekende klant';
  const blue=[24,95,165],dark=[30,30,30],gray=[110,110,110],lgt=[242,242,238];

  doc.setFillColor(...blue); doc.rect(0,0,210,38,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(20); doc.setTextColor(255,255,255);
  doc.text(BEDRIJF.naam,15,16);
  doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(200,220,245);
  doc.text(`${BEDRIJF.adres}  ·  ${BEDRIJF.postcode} ${BEDRIJF.stad}  ·  ${BEDRIJF.email}`,15,25);
  doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(255,255,255);
  doc.text('Inkoopbon',195,13,{align:'right'});
  doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(200,220,245);
  doc.text(`Order: ${o.id.toUpperCase()}`,195,21,{align:'right'});
  doc.text(`Datum: ${fmtDate(o.date)}`,195,28,{align:'right'});
  doc.text(`Status: ${o.status}`,195,34,{align:'right'});

  doc.setTextColor(...dark); doc.setFont('helvetica','bold'); doc.setFontSize(10);
  doc.text('Klantgegevens',15,48);
  doc.setDrawColor(...blue); doc.setLineWidth(0.4); doc.line(15,50,195,50);

  let cy=58;
  const row=(lbl,val)=>{
    doc.setFont('helvetica','bold'); doc.setTextColor(...gray); doc.text(lbl,15,cy);
    doc.setFont('helvetica','normal'); doc.setTextColor(...dark); doc.text(String(val||'-'),58,cy);
    cy+=6;
  };
  row('Naam:',klant);
  if(c?.street) row('Adres:',`${c.street} ${c.houseNumber||''}`.trim());
  if(c?.zip||c?.city) row('',`${c.zip||''} ${c.city||''}`.trim());
  if(c?.phone) row('Mobiel:',c.phone);
  if(c?.email) row('E-mail:',c.email);
  if(c?.iban) row('IBAN:',c.iban);
  if(c?.ibanName) row('Tenaamstelling:',c.ibanName);

  const tY=Math.max(cy+10,108);
  doc.setFillColor(...blue); doc.rect(15,tY,180,8,'F');
  doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(8.5);
  doc.text('Product',17,tY+5.5);
  doc.text('Aantal',122,tY+5.5,{align:'right'});
  doc.text('Dagprijs',158,tY+5.5,{align:'right'});
  doc.text('Subtotaal',193,tY+5.5,{align:'right'});

  let ry=tY+8;
  o.lines.forEach((ln,i)=>{
    if(i%2===0){doc.setFillColor(...lgt);doc.rect(15,ry,180,7,'F');}
    doc.setTextColor(...dark); doc.setFont('helvetica','normal'); doc.setFontSize(9);
    doc.text(String(ln.productName||''),17,ry+5);
    doc.text(String(ln.qty||1),122,ry+5,{align:'right'});
    doc.text(eur(ln.unitPrice),158,ry+5,{align:'right'});
    doc.text(eur((ln.qty||1)*(ln.unitPrice||0)),193,ry+5,{align:'right'});
    ry+=7;
  });

  doc.setDrawColor(...blue); doc.setLineWidth(0.4); doc.line(15,ry+2,195,ry+2);
  ry+=9;
  doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(...blue);
  doc.text('Totaal',140,ry);
  doc.text(eur(o.total||0),193,ry,{align:'right'});

  if(o.note){
    ry+=14;
    doc.setFillColor(245,248,252); doc.rect(15,ry-5,180,12,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...gray);
    doc.text('Notitie:',18,ry);
    doc.setFont('helvetica','normal'); doc.setTextColor(...dark);
    doc.text(String(o.note),42,ry);
  }

  doc.setFillColor(...blue); doc.rect(0,278,210,19,'F');
  doc.setTextColor(200,220,245); doc.setFont('helvetica','normal'); doc.setFontSize(8);
  doc.text(`${BEDRIJF.naam}  ·  ${BEDRIJF.adres}, ${BEDRIJF.postcode} ${BEDRIJF.stad}  ·  ${BEDRIJF.email}`,105,286,{align:'center'});
  doc.setTextColor(255,255,255); doc.setFontSize(7.5);
  doc.text('Gegenereerd op '+new Date().toLocaleDateString('nl-NL'),105,292,{align:'center'});

  const filename = `Inkoopbon_${o.id.toUpperCase()}_${o.date||'datum'}.pdf`;
  doc.save(filename);

  // Open mail met klantadres en standaardtekst
  const naam = c ? `${c.firstName} ${c.lastName}` : '';
  const to = c?.email || '';
  const subject = encodeURIComponent(`Inkoopbon ${o.id.toUpperCase()} - ICT-Recycle BV`);
  const body = encodeURIComponent(
    `Geachte ${naam},\n\nHierbij ontvangt u de inkoopbon voor uw geleverde ICT-materialen.\n\nMet vriendelijke groet,\nICT-Recycle BV\n${BEDRIJF.adres}, ${BEDRIJF.postcode} ${BEDRIJF.stad}\n${BEDRIJF.email}`
  );
  setTimeout(() => { window.location.href = `mailto:${to}?subject=${subject}&body=${body}`; }, 800);
}

// ── EXCEL EXPORT ──────────────────────────────────────────────────────────────
function exportXLS(){
  const wb=XLSX.utils.book_new();
  const oRows=[['Order ID','Datum','Status','Klant','Producten','Totaal (€)','Notitie']];
  db.orders.forEach(o=>{
    const c=db.customers.find(x=>x.id===o.customerId);
    oRows.push([o.id,o.date,o.status,c?`${c.firstName} ${c.lastName}`:'onbekend',o.lines.map(l=>`${l.qty}x ${l.productName} @ €${Number(l.unitPrice).toFixed(2)}`).join('; '),Number(o.total||0).toFixed(2),o.note||'']);
  });
  const ws=XLSX.utils.aoa_to_sheet(oRows);
  ws['!cols']=[{wch:14},{wch:12},{wch:10},{wch:22},{wch:50},{wch:12},{wch:20}];
  XLSX.utils.book_append_sheet(wb,ws,'Orders');
  const cRows=[['ID','Voornaam','Achternaam','Straat','Huisnr','Postcode','Plaats','Mobiel','E-mail','IBAN','Tenaamstelling']];
  db.customers.forEach(c=>cRows.push([c.id,c.firstName,c.lastName,c.street||'',c.houseNumber||'',c.zip||'',c.city||'',c.phone||'',c.email||'',c.iban||'',c.ibanName||'']));
  const wsc=XLSX.utils.aoa_to_sheet(cRows);
  XLSX.utils.book_append_sheet(wb,wsc,'Klanten');
  const pRows=[['ID','Naam','Dagprijs (€)','Bijgewerkt']];
  db.products.forEach(p=>pRows.push([p.id,p.name,Number(p.price||0).toFixed(2),fmtDate(p.updatedAt)]));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(pRows),'Producten');
  XLSX.writeFile(wb,`ICT-Recycle_Inkoop_${new Date().toISOString().slice(0,10)}.xlsx`);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderAll();
setFilter('alle');

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(function(){});
}
</script>
